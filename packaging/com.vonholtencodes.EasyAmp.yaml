app-id: com.vonholtencodes.EasyAmp
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: easyamp

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio          # playback + monitor capture for the visualizer
  - --filesystem=xdg-music:ro
  - --filesystem=xdg-download:ro
  # other locations are reached through the file-chooser portal

modules:
  # numpy, built from source (SDK provides gcc/meson/ninja/Cython); the
  # missing pure-Python build deps go to a throwaway dir, not the app.
  - name: python3-numpy
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --no-build-isolation --no-deps --target=_bdeps
        pyproject_metadata-0.11.0-py3-none-any.whl meson_python-0.19.0-py3-none-any.whl
      - PYTHONPATH="$PWD/_bdeps" pip3 install --no-index --no-build-isolation
        --prefix=${FLATPAK_DEST} numpy-2.4.6.tar.gz
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/d0/ad/fed0499ce6a338d2a03ebae59cd15093910c8875328855781952abf6c2fe/numpy-2.4.6.tar.gz
        sha256: f3a3570c4a2a16746ac2c31a7c7c7b0c186b95ce902e33db6f28094ed7387dda
      - type: file
        url: https://files.pythonhosted.org/packages/16/7f/d1b0c65b267a1463d752b324f11d3470e30889daefc4b9ec83029bfa30b5/meson_python-0.19.0-py3-none-any.whl
        sha256: 67b5906c37404396d23c195e12c8825506074460d4a2e7083266b845d14f0298
      - type: file
        url: https://files.pythonhosted.org/packages/1d/0b/da4851b1e2d9c40c9bd74c0abd94510a7d797da9ccde0a90e8953751ed4a/pyproject_metadata-0.11.0-py3-none-any.whl
        sha256: 85bbecca8694e2c00f63b492c96921d6c228454057c88e7c352b2077fcaa4096

  # ---- EasyAmp itself, from this source tree ----
  - name: easyamp
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --no-build-isolation --no-deps --prefix=${FLATPAK_DEST} .
      - install -Dm644 data/com.vonholtencodes.EasyAmp.desktop
        ${FLATPAK_DEST}/share/applications/com.vonholtencodes.EasyAmp.desktop
      - install -Dm644 data/com.vonholtencodes.EasyAmp.metainfo.xml
        ${FLATPAK_DEST}/share/metainfo/com.vonholtencodes.EasyAmp.metainfo.xml
      - install -Dm644 assets/icons/easyamp-256.png
        ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/com.vonholtencodes.EasyAmp.png
      - install -Dm644 assets/icons/easyamp-128.png
        ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.vonholtencodes.EasyAmp.png
      - install -Dm644 assets/easyamp-logo.svg
        ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/com.vonholtencodes.EasyAmp.svg
      # also drop the bundled fonts where fontconfig sees them in-sandbox
      - install -Dm644 easyamp/fonts/DSEG7Classic-Regular.ttf
        ${FLATPAK_DEST}/share/fonts/easyamp/DSEG7Classic-Regular.ttf
      - install -Dm644 easyamp/fonts/DSEG7Classic-Bold.ttf
        ${FLATPAK_DEST}/share/fonts/easyamp/DSEG7Classic-Bold.ttf
      - install -Dm644 easyamp/fonts/PixelifySans.ttf
        ${FLATPAK_DEST}/share/fonts/easyamp/PixelifySans.ttf
    sources:
      - type: dir
        path: ..
